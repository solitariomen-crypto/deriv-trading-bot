name: Daily Deriv Auto-Trading Bot

on:
  schedule:
    # Se ejecuta todos los días a las 19:30 hora Venezuela (23:30 UTC)
    # permitiendo que el bot opere y envíe el reporte cerca de las 20:00 hora Venezuela
    - cron: '30 23 * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde la pestaña Actions de tu repositorio en GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v6

    - name: Set up Python environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip' # Acelera las ejecuciones subsecuentes

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Deriv Automated Trading Bot
      env:
        # Vincula la API key de manera ultra segura usando los Secrets de GitHub
        DERIV_API_TOKEN: ${{ secrets.DERIV_API_TOKEN }}
        # Variables para las notificaciones de WhatsApp en el celular
        WHATSAPP_ENABLED: 'true'
        WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
        WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
      run: python bot.py

    - name: Archive trading logs and history
      if: always() # Guarda los logs incluso si el bot falla o se cancela
      uses: actions/upload-artifact@v7
      with:
        name: trading-session-logs
        path: |
          trading_log.txt
          trades_history.csv
        retention-days: 7
