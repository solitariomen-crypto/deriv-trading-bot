name: Daily Deriv Auto-Trading Bot

on:
  schedule:
    # Se ejecuta todos los días a las 09:00 UTC (Ajusta la hora UTC a tu preferencia)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde la pestaña Actions de tu repositorio en GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Acelera las ejecuciones subsecuentes

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Deriv Automated Trading Bot
      env:
        # Vincula la API key de manera ultra segura usando los Secrets de GitHub
        DERIV_API_TOKEN: ${{ secrets.DERIV_API_TOKEN }}
      run: python bot.py

    - name: Archive trading logs and history
      if: always() # Guarda los logs incluso si el bot falla o se cancela
      uses: actions/upload-artifact@v4
      with:
        name: trading-session-logs
        path: |
          trading_log.txt
          trades_history.csv
        retention-days: 7
